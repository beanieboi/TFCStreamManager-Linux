<!doctype html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="refresh" content="{{refreshInterval}}">
    <title></title>
    <style>
        body {
            font-family: Helvetica, sans-serif;
            zoom: 1.3;
            font-size: 20px;
            text-rendering: optimizeLegibility;
            text-rendering: geometricPrecision;
            -webkit-font-smoothing: antialiased;
        }

        .overlay-container {
            position: relative;
            display: inline-block;
        }

        .header {
            font-size: 12px;
            color: black;
            padding: 7px 20px 7px 8px;
            background-color: white;
            display: inline-block;
        }

        .player-row {
            display: flex;
            flex-direction: row;
            background-color: #63b1dc;
        }

        .player-row+.player-row {
            margin-top: 4px;
        }

        .player-name {
            color: black;
            text-overflow: ellipsis;
            white-space: nowrap;
            overflow: hidden;
            padding: 8px 8px;
        }

        .player-name p {
            margin: 0;
            font-size: 17px;
        }

        .player-name p+p {
            margin: 0;
            font-size: 12px;
            margin-top: 4px;
        }

        .stats {
            background-color: white;
            align-content: center;
            text-align: center;
            width: 50px;
            font-size: 23px;
            font-weight: 600;
            margin-left: auto;
        }

        .flex-auto {
            flex: auto;
        }

        .flex-none {
            flex: none;
        }
    </style>
</head>

<body>
    <div class="overlay-container">
        <div class="header">
            {{tournamentName}}
        </div>
        <div class="player-row">
            <div class="player-name">
                <p>{{teamA}}</p>
                <p>{{teamAPlayer}}</p>
            </div>
            <div class="stats">{{scoreA}}</div>
        </div>
        <div class="player-row">
            <div class="player-name">
                <p>{{teamB}}</p>
                <p>{{teamBPlayer}}</p>
            </div>
            <div class="stats">{{scoreB}}</div>
        </div>
    </div>
</body>

</html>
