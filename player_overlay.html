<!doctype html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="refresh" content="{{refreshInterval}}">
    <title></title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            zoom: 1.3;
            font-size: 20px;
        }

        .overlay-container {
            width: 400px;
            position: relative;
            border-color: white;
            border-radius: 2px;
            padding: 2px;
            background-color: white;
        }

        .header {
            font-size: 16px;
            display: flex;
            color: white;
            flex-direction: row;
            padding: 8px;
            background: linear-gradient(45deg, #204f6c, #469cd2);
        }

        .header-goals {
            padding-right: 8px;
        }

        .header-sets {
            padding-left: 8px;
        }

        .player-row {
            display: flex;
            flex-direction: row;
            background-color: #63b1dc;
        }

        .player-name {
            color: black;
            font-weight: 600;
            flex: auto;
            padding: 8px;
            text-overflow: ellipsis;
            white-space: nowrap;
            overflow: hidden;
        }

        .player-name-border {
            border-bottom: 1px solid black;
        }

        .stats {
            flex: none;
            padding: 8px;
        }

        .stats-border {
            border-bottom: 1px solid black;
        }

        .footer {
            padding: 8px;
            color: white;
            background: linear-gradient(45deg, #204f6c, #469cd2);
            font-size: 16px;
        }

        .flex-auto {
            flex: auto;
        }

        .flex-none {
            flex: none;
        }
    </style>
</head>

<body>
    <div class="overlay-container">
        <div class="header">
            <div class="flex-auto">{{tournamentName}}</div>
            <div class="header-goals flex-none">{{scoreName}}</div>
            <div class="header-sets flex-none">{{setsName}}</div>
        </div>
        <div class="player-row">
            <div class="player-name player-name-border">
                {{teamA}}
            </div>
            <div class="stats stats-border">{{scoreA}}</div>
            <div class="stats stats-border">{{setsA}}</div>
        </div>
        <div class="player-row">
            <div class="player-name">
                {{teamB}}
            </div>
            <div class="stats">{{scoreB}}</div>
            <div class="stats">{{setsB}}</div>
        </div>
        <div class="footer">{{disciplineName}} - {{roundName}} - {{groupName}}</div>
    </div>
</body>

</html>
